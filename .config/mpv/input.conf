# Browser-style playback controls
SPACE cycle pause
LEFT seek -5 exact
RIGHT seek 5 exact
UP add volume 5
DOWN add volume -5

# Captions, fullscreen, and sound
c cycle sub-visibility
f cycle fullscreen
m cycle mute

# Familiar YouTube-style alternatives
j seek -10 exact
k cycle pause
l seek 10 exact

# Playback and subtitle adjustments
[ add speed -0.25
] add speed 0.25
BS set speed 1.0
z add sub-delay -0.1
x add sub-delay 0.1

# Exit
q quit
ESC set fullscreen no
