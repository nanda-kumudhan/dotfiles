# Keep controls familiar and visible.
osc=yes
osd-level=1
osd-duration=1500
keep-open=yes

# Prefer subtitles when present, but allow c to hide them.
sub-auto=fuzzy
slang=en,eng
subs-with-matching-audio=no

# Sensible volume behavior for laptop use.
volume=70
volume-max=100
save-position-on-quit=yes
