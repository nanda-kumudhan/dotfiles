"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 750
scan_timeout = 30
palette = "terminal"

format = "$directory$git_branch$git_status$package$bun$nodejs$deno$python$php$ruby$rust$golang$java$dotnet$c$cpp$cmake$docker_context$status$fill$cmd_duration$jobs$time\n$character"

[palettes.terminal]
base = "#0b1020"
surface = "#111827"
surface_bright = "#1f2937"
muted = "#94a3b8"
text = "#e5e7eb"
accent = "#60a5fa"
red = "#f87171"
yellow = "#fbbf24"
green = "#34d399"
purple = "#c084fc"
cyan = "#22d3ee"
orange = "#fb923c"

[fill]
symbol = "ÔöÇ"
style = "fg:surface_bright"

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "fg:accent bold"
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
read_only = " ´Çú"
read_only_style = "fg:orange bold"

[git_branch]
symbol = "¯éá"
format = "[ $symbol $branch ](fg:purple)"
truncation_length = 24
truncation_symbol = "ÔÇª"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "fg:yellow"
conflicted = "="
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "-"

[package]
symbol = "¾░Åù"
format = "[ $symbol $version ](fg:purple)"

[bun]
symbol = "¯Ø»"
format = "[ $symbol $version ](fg:yellow)"

[nodejs]
symbol = "¯£ÿ"
format = "[ $symbol $version ](fg:green)"

[deno]
symbol = "¯ƒÇ"
format = "[ $symbol $version ](fg:green)"

[python]
symbol = "¯êÁ"
format = "[ $symbol ${version}(\\($virtualenv\\)) ](fg:yellow)"

[php]
symbol = "¯ÿê"
format = "[ $symbol $version ](fg:purple)"

[ruby]
symbol = "¯×æ"
format = "[ $symbol $version ](fg:red)"

[rust]
symbol = "¯×¿"
format = "[ $symbol $version ](fg:orange)"

[golang]
symbol = "¯ÿº"
format = "[ $symbol $version ](fg:cyan)"

[java]
symbol = "¯ëû"
format = "[ $symbol $version ](fg:red)"

[dotnet]
symbol = "¯Ø┐"
format = "[ $symbol $version ](fg:purple)"

[c]
symbol = "¯ÿ×"
format = "[ $symbol $version ](fg:cyan)"

[cpp]
symbol = "¯ÿØ"
format = "[ $symbol $version ](fg:cyan)"
disabled = false

[cmake]
symbol = "¯×ö"
format = "[ $symbol $version ](fg:accent)"

[docker_context]
symbol = "´îê"
format = "[ $symbol $context ](fg:cyan)"

[status]
disabled = false
symbol = "!"
format = "[ $symbol $status ](fg:orange)"

[cmd_duration]
min_time = 500
format = "[ $duration ](fg:muted)"
show_milliseconds = false

[jobs]
symbol = "Ô£ª"
format = "[ $symbol$number ](fg:purple bold)"

[time]
disabled = false
time_format = "%H:%M"
format = "[ $time ](fg:muted)"

[character]
success_symbol = "[ÔØ»](fg:green bold)"
error_symbol = "[ÔØ»](fg:orange bold)"
vimcmd_symbol = "[ÔØ«](fg:accent bold)"
vimcmd_replace_one_symbol = "[ÔØ«](fg:purple bold)"
vimcmd_replace_symbol = "[ÔØ«](fg:purple bold)"
vimcmd_visual_symbol = "[ÔØ«](fg:yellow bold)"
