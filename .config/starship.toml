"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 900
scan_timeout = 30
palette = "workbench"

format = "$fill$time\n$directory$git_branch$git_status$package$bun$nodejs$deno$python$php$ruby$rust$golang$java$dotnet$c$cpp$cmake$docker_context$status$cmd_duration$jobs\n$character"

[palettes.workbench]
base = "#000000"
surface = "#111111"
surface_bright = "#333333"
muted = "#aaaaaa"
text = "#eeeeee"
red = "#d76f7b"
green = "#8fbf7f"
yellow = "#c9a45f"
blue = "#6fb7c8"
purple = "#b58bdc"
cyan = "#6fb7c8"
orange = "#d19a66"

[fill]
symbol = "┬À"
style = "fg:surface_bright"

[directory]
format = "[´ü╝  $path]($style)[$read_only]($read_only_style)  "
style = "fg:cyan"
truncation_length = 3
truncate_to_repo = true
home_symbol = "~"
read_only = "  ´Çú"
read_only_style = "fg:orange"

[git_branch]
symbol = "¯éá"
format = "[$symbol  $branch]($style)  "
style = "fg:purple"
truncation_length = 24
truncation_symbol = "..."

[git_status]
format = "[$all_status$ahead_behind]($style)  "
style = "fg:yellow"
conflicted = "="
ahead = "Ôåæ"
behind = "Ôåô"
diverged = "Ôåò"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "-"

[package]
symbol = "¾░Åù"
format = "[$symbol  $version]($style)  "
style = "fg:purple"

[bun]
symbol = "¯Ø»"
format = "[$symbol  $version]($style)  "
style = "fg:yellow"

[nodejs]
symbol = "¯£ÿ"
format = "[$symbol  $version]($style)  "
style = "fg:green"

[deno]
symbol = "¯ƒÇ"
format = "[$symbol  $version]($style)  "
style = "fg:green"

[python]
symbol = "¯êÁ"
format = "[$symbol  ${version}(\\($virtualenv\\))]($style)  "
style = "fg:yellow"

[php]
symbol = "¯ÿê"
format = "[$symbol  $version]($style)  "
style = "fg:purple"

[ruby]
symbol = "¯×æ"
format = "[$symbol  $version]($style)  "
style = "fg:red"

[rust]
symbol = "¯×¿"
format = "[$symbol  $version]($style)  "
style = "fg:orange"

[golang]
symbol = "¯ÿº"
format = "[$symbol  $version]($style)  "
style = "fg:cyan"

[java]
symbol = "¯ëû"
format = "[$symbol  $version]($style)  "
style = "fg:red"

[dotnet]
symbol = "¯Ø┐"
format = "[$symbol  $version]($style)  "
style = "fg:purple"

[c]
symbol = "¯ÿ×"
format = "[$symbol  $version]($style)  "
style = "fg:cyan"

[cpp]
symbol = "¯ÿØ"
format = "[$symbol  $version]($style)  "
style = "fg:cyan"
disabled = false

[cmake]
symbol = "¯×ö"
format = "[$symbol  $version]($style)  "
style = "fg:cyan"

[docker_context]
symbol = "´îê"
format = "[$symbol  $context]($style)  "
style = "fg:cyan"

[status]
disabled = false
symbol = "´Çì"
format = "[$symbol  $status]($style)  "
style = "fg:red"

[cmd_duration]
min_time = 500
format = "[¾░öƒ  $duration]($style)  "
style = "fg:muted"
show_milliseconds = false

[jobs]
symbol = "´Çô"
format = "[$symbol  $number]($style)  "
