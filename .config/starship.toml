[time]
disabled = false
time_format = "%H:%M"
format = "[ ´Çù  $time ]($style)"
style = "fg:muted"

[character]
success_symbol = "[´æá](fg:green) "
error_symbol = "[´æá](fg:red) "
vimcmd_symbol = "[´æ¢](fg:cyan) "
vimcmd_replace_one_symbol = "[´æ¢](fg:purple) "
vimcmd_replace_symbol = "[´æ¢](fg:purple) "
vimcmd_visual_symbol = "[´æ¢](fg:yellow) "
